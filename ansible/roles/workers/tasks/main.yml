---
- name: Derive cluster group name from host groups
  ansible.builtin.set_fact:
    cluster_group_name: "{{ group_names | select('match', '^cluster_') | first }}"

- name: Resolve control-plane host for this worker
  ansible.builtin.set_fact:
    control_plane_host: "{{ (groups[cluster_group_name] | intersect(groups['role_Control_Plane_Node'])) | first }}"

- name: Ensure worker has a valid control-plane join command
  ansible.builtin.assert:
    that:
      - control_plane_host is defined
      - control_plane_host | length > 0
      - hostvars[control_plane_host].kubeadm_join_command is defined
      - hostvars[control_plane_host].kubeadm_join_command | length > 0
    fail_msg: >-
      Missing kubeadm join command for cluster {{ cluster_group_name }}.
      Re-run control plane stage first.

- name: Join worker to Kubernetes cluster
  ansible.builtin.command: "{{ hostvars[control_plane_host].kubeadm_join_command }}"
  args:
    creates: /etc/kubernetes/kubelet.conf
