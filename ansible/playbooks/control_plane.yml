---
- name: Initialize control planes for each cluster
  hosts: role_Control_Plane_Node
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Derive cluster group name from host groups
      ansible.builtin.set_fact:
        cluster_group_name: "{{ group_names | select('match', '^cluster_') | first }}"

    - name: Initialize cluster control plane
      ansible.builtin.command: >-
        kubeadm init
        --pod-network-cidr {{ pod_network_cidr }}
        --apiserver-advertise-address {{ ansible_default_ipv4.address }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Ensure kube config directory for ec2-user
      ansible.builtin.file:
        path: /home/ec2-user/.kube
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy admin kubeconfig to ec2-user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ec2-user/.kube/config
        owner: ec2-user
        group: ec2-user
        mode: "0600"
        remote_src: true

    - name: Install Flannel CNI
      become_user: ec2-user
      ansible.builtin.command: >-
        kubectl apply -f
        https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      register: flannel_apply
      changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

    - name: Create worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Store join command as host fact
      ansible.builtin.set_fact:
        kubeadm_join_command: "{{ join_command.stdout }}"
