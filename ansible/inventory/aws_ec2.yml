---
plugin: amazon.aws.aws_ec2
hostvars_prefix: aws_
regions:
  - eu-north-1

filters:
  instance-state-name: running
  tag:Cluster:
    - Dev/Test Cluster
    - Production Cluster

hostnames:
  - ip-address

keyed_groups:
  - key: aws_tags.Cluster
    prefix: cluster
    separator: _
  - key: aws_tags.Role
    prefix: role
    separator: _

compose:
  ansible_host: public_ip_address
  ansible_user: "'ec2-user'"
  ansible_ssh_private_key_file: "lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE')"
  ansible_ssh_common_args: "'-F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'"
